<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | The New College Assessment Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        :root {
            --maroon: #7a0b0b;
            --maroon-dark: #5b0707;
            --maroon-light: #9b1515;
            --gold: #d7b15c;
            --gold-light: #f0d08a;
            --cream: #fff7e6;
            --ink: #101828;
            --muted: #667085;
            --surface: #ffffff;
            --bg: #f9f4ec;
            --border: rgba(122, 11, 11, .13);
            --input-border: #e0d5c5;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 22px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
        }

        body {
            font-family: "DM Sans", system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--ink);
            overflow-x: hidden;
            padding: 2rem;
        }

        /* ────── Left Panel ────── */
        .left-panel {
            flex: 1;
            background: linear-gradient(145deg, var(--maroon-dark) 0%, var(--maroon) 55%, #9b1515 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
        }

        /* animated grid */
        .left-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(215, 177, 92, .07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(215, 177, 92, .07) 1px, transparent 1px);
            background-size: 55px 55px;
            animation: gridDrift 28s linear infinite;
        }

        @keyframes gridDrift {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(55px, 55px);
            }
        }

        /* glow blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            pointer-events: none;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(215, 177, 92, .16) 0%, transparent 70%);
            top: -120px;
            left: -80px;
            animation: blobFloat 12s ease-in-out infinite alternate;
        }

        .blob-2 {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(255, 255, 255, .07) 0%, transparent 70%);
            bottom: -60px;
            right: -40px;
            animation: blobFloat 16s ease-in-out infinite alternate-reverse;
        }

        @keyframes blobFloat {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(24px, -24px) scale(1.06);
            }
        }

        /* brand */
        .lp-brand {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: .8rem;
            text-decoration: none;
        }

        .lp-brand-logo {
            width: 46px;
            height: 46px;
            border-radius: var(--radius-sm);
            background: rgba(215, 177, 92, .14);
            border: 1px solid rgba(215, 177, 92, .32);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--gold);
        }

        .lp-brand-title {
            font-family: "Playfair Display", serif;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
        }

        .lp-brand-sub {
            font-size: .72rem;
            color: rgba(255, 255, 255, .55);
            margin-top: .1rem;
        }

        /* center content */
        .lp-center {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 0;
        }

        .lp-badge {
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            padding: .32rem .8rem;
            background: rgba(215, 177, 92, .12);
            border: 1px solid rgba(215, 177, 92, .28);
            border-radius: 99px;
            font-size: .77rem;
            color: var(--gold-light);
            letter-spacing: .4px;
            text-transform: uppercase;
            margin-bottom: 1.6rem;
        }

        .lp-badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 0 4px rgba(215, 177, 92, .2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 4px rgba(215, 177, 92, .2);
            }

            50% {
                box-shadow: 0 0 0 7px rgba(215, 177, 92, .08);
            }
        }

        .lp-heading {
            font-family: "Playfair Display", serif;
            font-size: clamp(2rem, 3.5vw, 2.8rem);
            font-weight: 900;
            color: #fff;
            line-height: 1.18;
            margin-bottom: 1rem;
        }

        .lp-heading span {
            background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lp-desc {
            font-size: .95rem;
            color: rgba(255, 255, 255, .65);
            line-height: 1.75;
            max-width: 380px;
            margin-bottom: 2.5rem;
        }

        /* feature pills */
        .lp-features {
            display: flex;
            flex-direction: column;
            gap: .7rem;
        }

        .lp-feat {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .7rem 1rem;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: var(--radius-sm);
            font-size: .88rem;
            color: rgba(255, 255, 255, .8);
        }

        .lp-feat i {
            color: var(--gold);
            width: 16px;
            text-align: center;
        }

        /* footer note */
        .lp-footer {
            position: relative;
            z-index: 1;
            font-size: .78rem;
            color: rgba(255, 255, 255, .3);
        }

        /* ────── Right Panel ────── */
        .right-panel {
            width: 480px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
            background: var(--bg);
            min-height: 100vh;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            animation: fadeSlideUp .6s ease both;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            margin-bottom: 2.2rem;
        }

        .login-header h1 {
            font-family: "Playfair Display", serif;
            font-size: 1.85rem;
            font-weight: 700;
            color: var(--maroon-dark);
            margin-bottom: .35rem;
        }

        .login-header p {
            font-size: .9rem;
            color: var(--muted);
        }

        .login-header p a {
            color: var(--maroon);
            font-weight: 600;
            text-decoration: none;
        }

        .login-header p a:hover {
            text-decoration: underline;
        }

        /* divider */
        .divider {
            display: flex;
            align-items: center;
            gap: .8rem;
            margin: 1.5rem 0;
        }

        .divider span {
            flex: 1;
            height: 1px;
            background: var(--input-border);
        }

        .divider p {
            font-size: .8rem;
            color: var(--muted);
            white-space: nowrap;
        }

        /* form */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-size: .82rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: .45rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap > i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: .88rem;
            pointer-events: none;
            transition: color .2s;
        }

        .input-wrap input {
            width: 100%;
            padding: .82rem 2.5rem .82rem 2.7rem;
            border: 1.5px solid var(--input-border);
            border-radius: var(--radius-sm);
            font-family: "DM Sans", sans-serif;
            font-size: .93rem;
            color: var(--ink);
            background: var(--surface);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        .input-wrap input::placeholder {
            color: #b0a898;
        }

        .input-wrap input:focus {
            border-color: var(--maroon);
            box-shadow: 0 0 0 3px rgba(122, 11, 11, .1);
        }

        .input-wrap input:focus ~ i,
        .input-wrap:focus-within > i {
            color: var(--maroon);
        }

        /* icon is before input in DOM so sibling selector won't work — use JS class instead */
        .input-wrap.focused > i {
            color: var(--maroon);
        }

        /* toggle password visibility */
        .pwd-toggle {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--muted);
            font-size: 1.1rem;
            padding: 0.5rem;
            transition: color .2s;
            z-index: 10;
        }

        .pwd-toggle i {
            pointer-events: none;
        }

        .pwd-toggle:hover {
            color: var(--maroon);
        }

        /* row: remember + forgot */
        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.6rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: .45rem;
            font-size: .83rem;
            color: var(--muted);
            cursor: pointer;
        }

        .remember input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: var(--maroon);
            cursor: pointer;
        }

        .forgot {
            font-size: .83rem;
            color: var(--maroon);
            font-weight: 600;
            text-decoration: none;
        }

        .forgot:hover {
            text-decoration: underline;
        }

        /* submit button */
        .btn-login {
            width: 100%;
            padding: .9rem;
            background: linear-gradient(135deg, var(--maroon-dark) 0%, var(--maroon) 60%, var(--maroon-light) 100%);
            color: #fff;
            font-family: "DM Sans", sans-serif;
            font-size: .98rem;
            font-weight: 700;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .6rem;
            transition: opacity .2s, transform .2s, box-shadow .2s;
            box-shadow: 0 4px 18px rgba(122, 11, 11, .3);
            position: relative;
            overflow: hidden;
        }

        .btn-login::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(215, 177, 92, .15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity .2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(122, 11, 11, .35);
        }

        .btn-login:hover::after {
            opacity: 1;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* loading state */
        .btn-login.loading .btn-text {
            opacity: 0;
        }

        .btn-login .btn-spinner {
            display: none;
            position: absolute;
        }

        .btn-login.loading .btn-spinner {
            display: block;
        }

        .btn-spinner i {
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* register link */
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .87rem;
            color: var(--muted);
        }

        .register-link a {
            color: var(--maroon);
            font-weight: 600;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* trust row */
        .trust-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--input-border);
        }

        .trust-item {
            display: flex;
            align-items: center;
            gap: .35rem;
            font-size: .76rem;
            color: var(--muted);
        }

        .trust-item i {
            color: var(--maroon);
            font-size: .7rem;
        }

        /* error message */
        .form-error {
            display: none;
            background: #fff1f1;
            border: 1px solid #fca5a5;
            color: #b91c1c;
            border-radius: var(--radius-sm);
            padding: .7rem 1rem;
            font-size: .84rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .form-error.hidden {
            display: none;
        }

        /* ────── Responsive ────── */
        @media (max-width: 860px) {
            body {
                flex-direction: column;
            }

            .left-panel {
                min-height: auto;
                padding: 2rem 1.5rem;
            }

            .lp-center {
                padding: 1.5rem 0;
            }

            .lp-heading {
                font-size: 1.7rem;
            }

            .right-panel {
                width: 100%;
                min-height: auto;
                padding: 2rem 1.5rem 3rem;
            }
        }

        @media (max-width: 480px) {
            .trust-row {
                flex-direction: column;
                gap: .6rem;
            }
        }
    </style>
</head>

<body>

    <div class="login-box" style="background: var(--surface); padding: 3.5rem 3rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); border: 1px solid var(--border); width: 100%; max-width: 440px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{{ url_for('static', filename='image.png') }}" alt="Logo" style="width: 60px; height: 60px; object-fit: contain; margin-bottom: 1rem;">
        </div>
        <div class="login-header" style="text-align: center;">
            <h1>Sign In</h1>
            <p>New here? <a href="/register">Create an account</a></p>
        </div>

        <!-- Error message -->
        {% if error %}
        <div class="form-error" id="formError">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorText">{{ error }}</span>
        </div>
        {% else %}
        <div class="form-error hidden" id="formError">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorText"></span>
        </div>
        {% endif %}

        <form method="POST" id="loginForm" novalidate>

            <!-- Email -->
            <div class="form-group">
                <label class="form-label" for="email">College Email Address</label>
                <div class="input-wrap" id="emailWrap">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="rollno@newcollege.ac.in"
                        autocomplete="email" required />
                </div>
            </div>

            <!-- Password (Register Number) -->
            <div class="form-group">
                <label class="form-label" for="password">Register Number (Password)</label>
                <div class="input-wrap" id="pwdWrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Enter your 13-digit register no"
                        autocomplete="current-password" required />
                    <button type="button" class="pwd-toggle" id="togglePwd" aria-label="Toggle password">
                        <i class="fa-regular fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Remember + Forgot -->
            <div class="form-row">
                <label class="remember">
                    <input type="checkbox" name="remember" />
                    Remember me
                </label>
                <a href="#" class="forgot">Forgot password?</a>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-login" id="loginBtn">
                <span class="btn-text"><i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In</span>
                <span class="btn-spinner"><i class="fa-solid fa-circle-notch"></i></span>
            </button>

        </form>

        <div class="register-link">
            Don't have an account? <a href="/register">Register with Roll Number</a>
        </div>
    </div>

    <script>
        /* ── Password toggle ── */
        const togglePwd = document.getElementById('togglePwd');
        const pwdInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        togglePwd.addEventListener('click', (e) => {
            e.preventDefault();
            const visible = pwdInput.type === 'text';
            pwdInput.type = visible ? 'password' : 'text';
            eyeIcon.className = visible ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
        });

        /* ── Focus classes for icon color ── */
        document.querySelectorAll('.input-wrap input').forEach(inp => {
            inp.addEventListener('focus', () => inp.closest('.input-wrap').classList.add('focused'));
            inp.addEventListener('blur', () => inp.closest('.input-wrap').classList.remove('focused'));
        });

        /* ── Form submit with loading state ── */
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const formError = document.getElementById('formError');

        form.addEventListener('submit', (e) => {
            if (formError) formError.classList.add('hidden');

            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            if (!email || !pass) {
                e.preventDefault();
                if (formError) {
                    formError.classList.remove('hidden');
                    document.getElementById('errorText').textContent = 'Please fill in all fields.';
                }
                return;
            }

            /* Loading state */
            loginBtn.classList.add('loading');
            
            /* Disable button slightly after submit to prevent browser aborting the request */
            setTimeout(() => {
                loginBtn.disabled = true;
            }, 10);
        });
    </script>
</body>

</html>
